databases:
  - name: mockmindai-db
    databaseName: mockmindai
    user: mockmindai
    plan: free
    region: singapore

services:
  - type: web
    name: mockmindai-api
    runtime: docker
    plan: free
    region: singapore
    repo: https://github.com/SriVarshini15/MockMindAI.git
    branch: main
    dockerfilePath: ./backend/MockMindAI.Api/Dockerfile
    dockerContext: ./backend/MockMindAI.Api
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_FORWARDEDHEADERS_ENABLED
        value: "true"
      - key: Database__AutoMigrate
        value: "true"
      - key: ConnectionStrings__DefaultConnection
        fromDatabase:
          name: mockmindai-db
          property: connectionString
      - key: Jwt__Key
        generateValue: true
      - key: Jwt__Issuer
        value: MockMindAI
      - key: Jwt__Audience
        value: MockMindAIUsers
      - key: Gemini__ApiKey
        sync: false
      - key: Gemini__Model
        value: gemini-2.5-flash
      - key: Frontend__AllowedOrigins__0
        sync: false
